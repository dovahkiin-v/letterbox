[letterbox]
state_dir = "~/.letterbox"              # where channels live

[harness.claude]
command = "claude"
default_args = ["--dangerously-skip-permissions"]
notification_template = "📬 Peer message on channel {channel}. Call check_messages to read."

[harness.gemini]
command = "gemini"
default_args = ["--yolo"]
notification_template = "📬 Peer message on channel {channel}. Use check_messages."

[harness.antigravity]
command = "agy"
default_args = []
notification_template = "📬 Peer message on channel {channel}. Use check_messages."

[[channels]]
name = "debate-01"
description = "Default sample channel"
# NOTE: identity is per-launch (--as or LETTERBOX_SENDER), never per-channel-config.
